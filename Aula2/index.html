<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js"></script>
</head>
<body>
    <h1>Trocando de cor as DIVS</h1>
    <button id="botaoTrocaCor" onclick="trocaCor()">Trocar de cor</button>
    <button id="botaoRetornaCor" onclick="retornaCor()">Retorna de cor</button>
    <div id="div1" class="divTrocaCor">Div 1</div>
    <div id="div2" class="divTrocaCor">Div 1</div>
    <div id="div3" class="divTrocaCor">Div 1</div>

    <h1>Calculadora Básica</h1>
    <p>Operadores válidos: +, -, *, /.</p>
    <input type="text" id="num1" placeholder="Primeiro número">
    <input type="text" id="num2" placeholder="Segundo número">
    <input type="text" id="operador" placeholder="Operador">
    <button onclick="efetuaOperacao()">Efetuar Operação</button>
    <p id="resultado"></p>

    <h1>Escolha seu idioma de boas vindas</h1>

    <label for="idioma">Idioma: </label>

        <select name="" id="idioma">

            <option value="">Selecione uma opção</option>
            <option value="portugues">Português</option>
            <option value="ingles">Inglês</option>
            <option value="espanhol">Espanhol</option>
            <option value="frances">Francês</option>

        </select>

        <button onclick="selecionaLingua()">Quero esse</button>

        <p id="benvindo"></p>
</body>
</html>
